<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Leyla Spiel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #87ceeb;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }
    canvas { display: block; border-radius: 8px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 900;
canvas.height = 420;
const W = canvas.width;
const H = canvas.height;

const GROUND = H - 80;
const WIN_TIME = 60; // 1 Minute in Sekunden

// States
const S = { MENU: 0, PLAY: 1, OVER: 2, WIN: 3 };
let state = S.MENU;

// Input
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space', 'ArrowUp', 'ArrowDown'].includes(e.code)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Audio System
const Audio = {
  ctx: null,
  init() {
    if (!this.ctx) {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
  },
  // Play a tone with given frequency, duration, type and volume
  playTone(freq, duration, type = 'sine', volume = 0.3) {
    if (!this.ctx) this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + duration);
  },
  // Jump sound - upward sweep
  jump() {
    if (!this.ctx) this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, this.ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(600, this.ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.2);
  },
  // Duck sound - low thud
  duck() {
    this.playTone(150, 0.1, 'square', 0.15);
  },
  // Crash/game over sound
  crash() {
    if (!this.ctx) this.init();
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(300, this.ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(50, this.ctx.currentTime + 0.5);
    gain.gain.setValueAtTime(0.4, this.ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.5);
    osc.connect(gain);
    gain.connect(this.ctx.destination);
    osc.start();
    osc.stop(this.ctx.currentTime + 0.5);
  },
  // Win/apple crunch
  crunch() {
    if (!this.ctx) this.init();
    const now = this.ctx.currentTime;
    // Play multiple short noise bursts
    for (let i = 0; i < 5; i++) {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = 800 + Math.random() * 400;
      gain.gain.setValueAtTime(0.1, now + i * 0.05);
      gain.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.08);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(now + i * 0.05);
      osc.stop(now + i * 0.05 + 0.08);
    }
  },
  // Win fanfare
  win() {
    if (!this.ctx) this.init();
    const now = this.ctx.currentTime;
    const melody = [
      { f: 523.25, t: 0, d: 0.2 },    // C5
      { f: 659.25, t: 0.2, d: 0.2 },  // E5
      { f: 783.99, t: 0.4, d: 0.2 },  // G5
      { f: 1046.50, t: 0.6, d: 0.4 }  // C6
    ];
    melody.forEach(note => {
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = note.f;
      gain.gain.setValueAtTime(0.25, now + note.t);
      gain.gain.exponentialRampToValueAtTime(0.01, now + note.t + note.d);
      osc.connect(gain);
      gain.connect(this.ctx.destination);
      osc.start(now + note.t);
      osc.stop(now + note.t + note.d);
    });
  },
  // Menu hover/select
  select() {
    this.playTone(440, 0.05, 'sine', 0.2);
  },
  // Start game sound
  start() {
    if (!this.ctx) this.init();
    const now = this.ctx.currentTime;
    const notes = [440, 554, 659, 880];
    notes.forEach((f, i) => {
      setTimeout(() => this.playTone(f, 0.1, 'triangle', 0.15), i * 80);
    });
  }
};

// Clouds
const clouds = [];
for (let i = 0; i < 6; i++) {
  clouds.push({ x: Math.random() * W, y: 30 + Math.random() * 80, w: 80 + Math.random() * 60, speed: 0.3 + Math.random() * 0.3 });
}

// Background trees/bushes
const bgTrees = [];
for (let i = 0; i < 8; i++) {
  bgTrees.push({ x: i * 120 + Math.random() * 60, y: GROUND - 20 - Math.random() * 40, size: 20 + Math.random() * 30 });
}

// Particles
let particles = [];
function burst(x, y, color, n = 10) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 5;
    particles.push({ x, y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd - 2, life: 1, color, size: 4 + Math.random() * 5 });
  }
}

// Horse
let horse = {};
function resetHorse() {
  horse = {
    x: 130,
    y: GROUND,
    vy: 0,
    ducking: false,
    jumping: false,
    legPhase: 0,
    dead: false,
    hitFlash: 0
  };
}

// Game vars
let obstacles = [];
let groundScroll = 0;
let bgScroll = 0;
let spawnTimer = 80;
let gameTime = 0;       // in frames
let gameSpeed = 5;
let score = 0;
let highScore = 0;

// Win state
let winDonerX = 0;
let winDonerY = 0;
let winDonerScale = 0;
let winBiteTimer = 0;
let winBiteCount = 0;
let winDone = false;
let winTimer = 0;
let winMunchAnim = 0;
let horseWinX = 0;
let horseWinY = 0;

function reset() {
  resetHorse();
  obstacles = [];
  groundScroll = 0;
  bgScroll = 0;
  spawnTimer = 80;
  gameTime = 0;
  gameSpeed = 5;
  score = 0;
  particles = [];
  winDone = false;
  winTimer = 0;
  winBiteTimer = 0;
  winBiteCount = 0;
  winAppleScale = 0;
  winMunchAnim = 0;
  clouds.forEach(c => { c.x = Math.random() * W; });
}

// Obstacle types
// type: 'fence' = jump over, 'bird' = duck under, 'rock' = jump over (small), 'branch' = duck under
function spawnObstacle() {
  const t = gameTime;
  const elapsed = t / 60;

  // Progressive difficulty: more birds and variety as time goes on
  let birdChance = 0.35 + (elapsed / WIN_TIME) * 0.35;
  if (elapsed > 30) birdChance = 0.5; // After 30s, 50% birds
  if (elapsed > 45) birdChance = 0.6; // After 45s, 60% birds

  const rand = Math.random();
  const type = rand < birdChance ? 'bird' : (rand < birdChance + 0.25 ? 'rock' : 'fence');

  if (type === 'fence') {
    // Single or double fence
    const count = Math.random() < 0.5 ? 2 : 1;
    const h = 40 + Math.random() * 35;
    const gap = count === 2 ? 25 : 0;
    obstacles.push({
      type: 'fence',
      x: W + 30,
      y: GROUND - h,
      w: 18 * count + gap,
      h,
      count
    });
  } else if (type === 'rock') {
    // Small rock on ground - must jump over
    const size = 25 + Math.random() * 15;
    obstacles.push({
      type: 'rock',
      x: W + 30,
      y: GROUND - size * 0.6,
      size,
      w: size,
      h: size * 0.6
    });
  } else {
    // Bird - flying obstacle to duck under
    // Position at ducking height (where horse head would be)
    // When ducking, horse height is ~28, normal is ~60
    // Bird should be at GROUND - 45 to GROUND - 65 (duck zone)
    const birdY = GROUND - 50 - Math.random() * 20;
    obstacles.push({
      type: 'bird',
      x: W + 30,
      y: birdY,
      wingPhase: 0,
      w: 50,
      h: 30
    });
  }
}

// --- UPDATE ---
function update() {
  if (state !== S.PLAY && state !== S.WIN) return;

  if (state === S.WIN) {
    updateWin();
    return;
  }

  gameTime++;
  const elapsed = gameTime / 60; // seconds
  score = Math.floor(elapsed);

  // Speed ramp
  gameSpeed = 5 + elapsed * 0.02;

  // Scrolling
  groundScroll = (groundScroll + gameSpeed) % 40;
  bgScroll = (bgScroll + gameSpeed * 0.4) % W;
  clouds.forEach(c => { c.x -= c.speed; if (c.x < -150) c.x = W + 50; });
  bgTrees.forEach(t => { t.x -= gameSpeed * 0.5; if (t.x < -60) t.x = W + 60; });

  // Win check
  if (elapsed >= WIN_TIME) {
    state = S.WIN;
    winTimer = 0;
    winDonerX = horse.x + 120;
    winDonerY = GROUND - 30;
    winDonerScale = 0;
    winBiteTimer = 0;
    winBiteCount = 0;
    horseWinX = horse.x;
    horseWinY = horse.y;
    if (score > highScore) highScore = score;
    return;
  }

  // Horse jump
  const jumpPressed = keys['Space'] || keys['ArrowUp'];
  const duckPressed = keys['ArrowDown'] || keys['KeyS'];

  if (duckPressed && !horse.jumping && !horse.ducking) {
    Audio.duck();
  }
  horse.ducking = duckPressed && !horse.jumping;

  if (jumpPressed && !horse.jumping) {
    horse.vy = -14;
    horse.jumping = true;
    horse.ducking = false;
    burst(horse.x, GROUND, '#a0522d', 6);
    Audio.jump();
  }

  if (horse.jumping) {
    horse.vy += 0.6; // gravity
    horse.y += horse.vy;
    if (horse.y >= GROUND) {
      horse.y = GROUND;
      horse.vy = 0;
      horse.jumping = false;
    }
  }

  // Leg animation
  if (!horse.ducking) horse.legPhase += horse.jumping ? 0.15 : 0.25;

  if (horse.hitFlash > 0) horse.hitFlash--;

  // Spawn obstacles - faster spawning for more challenge
  if (--spawnTimer <= 0) {
    spawnObstacle();
    // Spawn faster as game progresses
    const baseSpawnTime = Math.max(40, 90 - elapsed * 0.8);
    spawnTimer = baseSpawnTime + Math.random() * 25;
  }

  // Update obstacles
  obstacles = obstacles.filter(o => {
    o.x -= gameSpeed;
    if (o.type === 'bird') o.wingPhase += 0.18;

    // Collision - realistic hitboxes on same level as horse
    if (!horse.dead) {
      // Horse hitbox
      const hx = horse.x - 22;
      const hy = horse.ducking ? GROUND - 32 : horse.y - 58;
      const hw = 44;
      const hh = horse.ducking ? 32 : 58;

      // Draw debug hitbox (uncomment to see)
      // ctx.strokeStyle = 'red'; ctx.strokeRect(hx, hy, hw, hh);

      if (o.type === 'fence') {
        // Fence hitbox
        const fx = o.x;
        const fy = o.y;
        const fw = o.w;
        const fh = o.h;
        if (hx < fx + fw - 5 && hx + hw > fx + 5 && hy < fy + fh && hy + hh > fy) {
          killHorse();
        }
      } else if (o.type === 'rock') {
        // Rock hitbox
        const rx = o.x - o.size * 0.4;
        const ry = o.y - o.size * 0.3;
        const rw = o.size * 0.8;
        const rh = o.size * 0.6;
        if (hx < rx + rw && hx + hw > rx && hy < ry + rh && hy + hh > ry) {
          killHorse();
        }
      } else if (o.type === 'bird') {
        // Bird hitbox - positioned where horse head would be
        const bx = o.x - 28;
        const by = o.y - 15;
        const bw = 56;
        const bh = 30;
        // Only collide if horse is NOT ducking
        if (!horse.ducking) {
          if (hx < bx + bw && hx + hw > bx && hy < by + bh && hy + hh > by) {
            killHorse();
          }
        }
      }
    }

    return o.x > -80;
  });

  // Particles
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.03;
    return p.life > 0;
  });
}

function killHorse() {
  if (horse.hitFlash > 0) return;
  horse.dead = true;
  Audio.crash();
  burst(horse.x, horse.y - 30, '#cc4400', 20);
  burst(horse.x, horse.y - 30, '#ffcc00', 15);
  setTimeout(() => { state = S.OVER; if (score > highScore) highScore = score; }, 600);
}

function updateWin() {
  winTimer++;
  // Clouds still move
  clouds.forEach(c => { c.x -= c.speed; if (c.x < -150) c.x = W + 50; });
  bgScroll = (bgScroll + 1) % W;

  // Döner appears
  if (winDonerScale < 1) winDonerScale = Math.min(1, winDonerScale + 0.03);

  // Horse walks toward Döner
  if (horseWinX < winDonerX - 60) {
    horseWinX += 2.5;
    horse.legPhase += 0.2;
  } else {
    horse.legPhase = 0;
    // Bite animation
    winBiteTimer++;
    if (winBiteTimer > 40 && winBiteCount < 4) {
      winBiteTimer = 0;
      winBiteCount++;
      winMunchAnim = 15;
      Audio.crunch();
      burst(winDonerX, winDonerY, '#8B4513', 8);  // Fleisch-Farben
      burst(winDonerX, winDonerY, '#228B22', 5); // Salat-Farben
      burst(winDonerX, winDonerY, '#DC143C', 4); // Tomaten-Farben
      if (winBiteCount >= 4) {
        winDonerScale = 0; // Döner eaten
        winDone = true;
      }
    }
    if (winMunchAnim > 0) winMunchAnim--;
  }
  horse.x = horseWinX;
  horse.y = horseWinY;

  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.1;
    p.life -= 0.025;
    return p.life > 0;
  });
}

// --- DRAW ---
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND);
  grad.addColorStop(0, '#5bb8e8');
  grad.addColorStop(1, '#c8e8f8');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(c.x, c.y, c.w / 2, 22, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x - c.w * 0.2, c.y + 8, c.w * 0.3, 16, 0, 0, Math.PI * 2);
    ctx.ellipse(c.x + c.w * 0.25, c.y + 6, c.w * 0.28, 18, 0, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawGround() {
  // Grass top
  ctx.fillStyle = '#5a9a3a';
  ctx.fillRect(0, GROUND, W, 14);
  // Soil
  const soilGrad = ctx.createLinearGradient(0, GROUND + 14, 0, H);
  soilGrad.addColorStop(0, '#8b5e3c');
  soilGrad.addColorStop(1, '#6b4423');
  ctx.fillStyle = soilGrad;
  ctx.fillRect(0, GROUND + 14, W, H - GROUND - 14);
  // Ground marks
  ctx.strokeStyle = 'rgba(0,0,0,0.1)';
  ctx.lineWidth = 2;
  for (let x = (-groundScroll) % 40; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, GROUND + 4); ctx.lineTo(x + 15, GROUND + 4); ctx.stroke();
  }
  // Grass tufts
  ctx.fillStyle = '#3a7a2a';
  for (let x = (-groundScroll * 1.5) % 60; x < W; x += 60) {
    ctx.beginPath();
    ctx.moveTo(x, GROUND); ctx.lineTo(x - 4, GROUND - 8); ctx.lineTo(x, GROUND - 4);
    ctx.lineTo(x + 4, GROUND - 10); ctx.lineTo(x + 8, GROUND - 5); ctx.lineTo(x + 12, GROUND - 9);
    ctx.lineTo(x + 16, GROUND); ctx.fill();
  }
}

function drawBgTrees() {
  bgTrees.forEach(t => {
    // Trunk
    ctx.fillStyle = '#7a5230';
    ctx.fillRect(t.x - 4, t.y, 8, 20);
    // Foliage
    ctx.fillStyle = `hsl(${110 + Math.sin(t.x * 0.1) * 10}, 45%, 35%)`;
    ctx.beginPath(); ctx.arc(t.x, t.y - t.size * 0.3, t.size * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = `hsl(${120 + Math.sin(t.x * 0.15) * 10}, 50%, 40%)`;
    ctx.beginPath(); ctx.arc(t.x - t.size * 0.3, t.y + t.size * 0.1, t.size * 0.45, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x + t.size * 0.3, t.y + t.size * 0.1, t.size * 0.45, 0, Math.PI * 2); ctx.fill();
  });
}

function drawObstacles() {
  obstacles.forEach(o => {
    if (o.type === 'fence') {
      // Wooden fence posts
      for (let i = 0; i < o.count; i++) {
        const fx = o.x + i * 24;
        // Post
        ctx.fillStyle = '#b8860b';
        ctx.fillRect(fx, o.y, 14, o.h);
        // Plank top
        ctx.fillStyle = '#daa520';
        ctx.fillRect(fx - 2, o.y, 18, 8);
        // Wood grain
        ctx.strokeStyle = 'rgba(0,0,0,0.15)';
        ctx.lineWidth = 1;
        for (let g = 0; g < 3; g++) {
          ctx.beginPath();
          ctx.moveTo(fx + 3 + g * 3, o.y + 10);
          ctx.lineTo(fx + 3 + g * 3, o.y + o.h - 2);
          ctx.stroke();
        }
      }
      if (o.count > 1) {
        // Horizontal rail
        ctx.fillStyle = '#cd853f';
        ctx.fillRect(o.x, o.y + o.h * 0.4, o.w, 6);
        ctx.fillRect(o.x, o.y + o.h * 0.7, o.w, 6);
      }
    } else if (o.type === 'rock') {
      // Rock/Stein auf dem Boden
      const rx = o.x;
      const ry = o.y + o.size * 0.3;
      const rsize = o.size;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(rx, GROUND + 5, rsize * 0.4, rsize * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();

      // Rock body
      ctx.fillStyle = '#7a7a7a';
      ctx.beginPath();
      ctx.ellipse(rx, ry, rsize * 0.4, rsize * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // Rock highlights
      ctx.fillStyle = '#9a9a9a';
      ctx.beginPath();
      ctx.ellipse(rx - rsize * 0.15, ry - rsize * 0.1, rsize * 0.2, rsize * 0.15, 0, 0, Math.PI * 2);
      ctx.fill();

      // Rock texture
      ctx.fillStyle = '#5a5a5a';
      ctx.beginPath();
      ctx.arc(rx + rsize * 0.15, ry + rsize * 0.05, rsize * 0.08, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // Bird - flapping obstacle to duck under
      const bx = o.x, by = o.y;
      const flap = Math.sin(o.wingPhase) * 12;

      // Shadow on ground below bird
      ctx.fillStyle = 'rgba(0,0,0,0.15)';
      ctx.beginPath();
      const distToGround = GROUND - by;
      ctx.ellipse(bx, GROUND + 5, 15 * (1 - distToGround/200), 5, 0, 0, Math.PI * 2);
      ctx.fill();

      // Bird body
      ctx.fillStyle = '#8B4513'; // Brown bird
      ctx.beginPath();
      ctx.ellipse(bx, by, 16, 9, 0, 0, Math.PI * 2);
      ctx.fill();

      // Wings flapping
      ctx.fillStyle = '#A0522D';
      ctx.beginPath();
      ctx.moveTo(bx - 5, by - 2);
      ctx.bezierCurveTo(bx - 22, by - flap, bx - 32, by - flap + 4, bx - 28, by + 4);
      ctx.bezierCurveTo(bx - 18, by + 2, bx - 10, by, bx - 5, by - 2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(bx + 5, by - 2);
      ctx.bezierCurveTo(bx + 22, by - flap, bx + 32, by - flap + 4, bx + 28, by + 4);
      ctx.bezierCurveTo(bx + 18, by + 2, bx + 10, by, bx + 5, by - 2);
      ctx.fill();

      // Head
      ctx.fillStyle = '#8B4513';
      ctx.beginPath(); ctx.arc(bx + 14, by - 3, 7, 0, Math.PI * 2); ctx.fill();

      // Beak
      ctx.fillStyle = '#FFD700';
      ctx.beginPath();
      ctx.moveTo(bx + 20, by - 4);
      ctx.lineTo(bx + 27, by - 2);
      ctx.lineTo(bx + 20, by);
      ctx.fill();

      // Eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(bx + 16, by - 5, 2.2, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.arc(bx + 17, by - 5, 1.1, 0, Math.PI * 2); ctx.fill();

      // Feathers
      ctx.strokeStyle = 'rgba(139,69,19,0.5)';
      ctx.lineWidth = 1;
      for (let i = -2; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(bx + i * 5, by + 6);
        ctx.lineTo(bx + i * 5, by + 12);
        ctx.stroke();
      }

      // Visual indicator for duck zone
      if (o.x > 0 && o.x < W) {
        ctx.strokeStyle = 'rgba(255,200,0,0.3)';
        ctx.lineWidth = 2;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(bx - 50, GROUND - 35);
        ctx.lineTo(bx + 50, GROUND - 35);
        ctx.stroke();
        ctx.setLineDash([]);
      }
    }
  });
}

function drawHorse(x, y, ducking, legPhase, hitFlash, munchOverride) {
  const flash = hitFlash > 0 && Math.floor(hitFlash / 4) % 2 === 0;
  if (flash) return;

  ctx.save();
  ctx.translate(x, y);

  const bodyH = ducking ? 28 : 58;
  const bodyW = 65;
  const bodyY = ducking ? -bodyH : -bodyH;

  // Tail
  ctx.strokeStyle = '#8b5e3c';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  const tailSwing = Math.sin(legPhase) * (ducking ? 5 : 10);
  ctx.moveTo(-30, bodyY + 10);
  ctx.bezierCurveTo(-50, bodyY + 5 + tailSwing, -55, bodyY + 25 + tailSwing, -48, bodyY + 40 + tailSwing);
  ctx.stroke();
  // Tail hair
  ctx.lineWidth = 2;
  for (let i = 0; i < 4; i++) {
    const off = (i - 1.5) * 5;
    ctx.beginPath();
    ctx.moveTo(-48 + off, bodyY + 38 + tailSwing);
    ctx.lineTo(-52 + off, bodyY + 55 + tailSwing);
    ctx.stroke();
  }

  // Legs
  const legColor = '#a0522d';
  const hoofColor = '#333';
  ctx.fillStyle = legColor;

  if (!ducking) {
    const legDefs = [
      { xOff: -20, phase: 0 },
      { xOff: -5, phase: Math.PI },
      { xOff: 15, phase: Math.PI * 0.5 },
      { xOff: 28, phase: Math.PI * 1.5 }
    ];
    legDefs.forEach(l => {
      const swing = Math.sin(legPhase + l.phase) * 12;
      ctx.fillStyle = legColor;
      ctx.fillRect(l.xOff - 4, 0, 8, 20 + swing * 0.5);
      ctx.fillStyle = hoofColor;
      ctx.fillRect(l.xOff - 5, 18 + swing * 0.5, 10, 8);
    });
  } else {
    // Ducking: legs bent
    [-22, -8, 10, 24].forEach(lx => {
      ctx.fillStyle = legColor;
      ctx.fillRect(lx - 3, -2, 6, 10);
      ctx.fillStyle = hoofColor;
      ctx.fillRect(lx - 4, 7, 8, 6);
    });
  }

  // Body
  const bodyColor = '#c8813c';
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(-32, bodyY, bodyW, bodyH, 18);
  ctx.fill();
  // Body shading
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.beginPath();
  ctx.roundRect(-32, bodyY + bodyH * 0.6, bodyW, bodyH * 0.4, [0, 0, 18, 18]);
  ctx.fill();

  if (!ducking) {
    // Neck
    ctx.fillStyle = '#b8722c';
    ctx.beginPath();
    ctx.moveTo(22, bodyY + 8);
    ctx.lineTo(35, bodyY - 22);
    ctx.lineTo(48, bodyY - 16);
    ctx.lineTo(36, bodyY + 16);
    ctx.fill();

    // Head
    ctx.fillStyle = '#c8813c';
    ctx.beginPath();
    ctx.ellipse(46, bodyY - 24, 22, 16, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // Snout
    const munchOffset = (munchOverride && munchOverride > 0) ? Math.sin((15 - munchOverride) / 15 * Math.PI) * 5 : 0;
    ctx.fillStyle = '#e09050';
    ctx.beginPath();
    ctx.ellipse(63, bodyY - 20 + munchOffset, 12, 9, 0.1, 0, Math.PI * 2);
    ctx.fill();
    // Nostril
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.ellipse(60, bodyY - 19 + munchOffset, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(66, bodyY - 19 + munchOffset, 2.5, 2, 0, 0, Math.PI * 2); ctx.fill();

    // Eye
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(54, bodyY - 30, 5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4a2800';
    ctx.beginPath(); ctx.arc(55.5, bodyY - 30, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(56.5, bodyY - 31, 1, 0, Math.PI * 2); ctx.fill();

    // Ear
    ctx.fillStyle = '#c8813c';
    ctx.beginPath();
    ctx.moveTo(42, bodyY - 36); ctx.lineTo(36, bodyY - 50); ctx.lineTo(50, bodyY - 44); ctx.fill();
    ctx.fillStyle = '#e8a070';
    ctx.beginPath();
    ctx.moveTo(42, bodyY - 36); ctx.lineTo(38, bodyY - 46); ctx.lineTo(47, bodyY - 42); ctx.fill();

    // Mane
    ctx.strokeStyle = '#6b3a1f';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    for (let i = 0; i < 5; i++) {
      const mx = 30 - i * 7;
      const swing2 = Math.sin(legPhase + i * 0.5) * 3;
      ctx.beginPath();
      ctx.moveTo(mx, bodyY + 4);
      ctx.bezierCurveTo(mx - 5 + swing2, bodyY - 5, mx - 8 + swing2, bodyY - 12, mx - 6 + swing2, bodyY - 20);
      ctx.stroke();
    }
  } else {
    // Ducking head (lower)
    ctx.fillStyle = '#b8722c';
    ctx.beginPath();
    ctx.moveTo(20, bodyY + 6);
    ctx.lineTo(32, bodyY - 8);
    ctx.lineTo(44, bodyY - 4);
    ctx.lineTo(34, bodyY + 10);
    ctx.fill();
    ctx.fillStyle = '#c8813c';
    ctx.beginPath();
    ctx.ellipse(44, bodyY - 6, 20, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e09050';
    ctx.beginPath();
    ctx.ellipse(59, bodyY - 3, 10, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.ellipse(57, bodyY - 3, 2, 1.8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(62, bodyY - 3, 2, 1.8, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(50, bodyY - 8, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#4a2800';
    ctx.beginPath(); ctx.arc(51, bodyY - 8, 2.5, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();
}

function drawDoner(x, y, scale) {
  if (scale <= 0) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(scale, scale);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 35, 25, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  // Döner Brot (pita wrap shape)
  ctx.fillStyle = '#D4A574';
  ctx.beginPath();
  ctx.ellipse(0, 0, 30, 45, 0, 0, Math.PI * 2);
  ctx.fill();

  // Brot texture/shading
  ctx.fillStyle = '#C49464';
  ctx.beginPath();
  ctx.ellipse(5, 5, 20, 30, 0, 0, Math.PI * 2);
  ctx.fill();

  // Fleisch (rot-braun)
  ctx.fillStyle = '#8B4513';
  ctx.beginPath();
  ctx.moveTo(-18, -15);
  for (let i = -18; i <= 18; i += 6) {
    ctx.lineTo(i, -15 + Math.random() * 8);
  }
  ctx.lineTo(15, -5);
  ctx.lineTo(-15, -5);
  ctx.closePath();
  ctx.fill();

  // Fleisch details
  ctx.fillStyle = '#A0522D';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.arc(-12 + i * 6, -12 + Math.random() * 4, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Salat (grün)
  ctx.fillStyle = '#228B22';
  ctx.beginPath();
  ctx.moveTo(-20, -8);
  ctx.bezierCurveTo(-15, -20, -5, -22, 0, -18);
  ctx.bezierCurveTo(5, -22, 15, -20, 20, -8);
  ctx.lineTo(18, -5);
  ctx.lineTo(-18, -5);
  ctx.closePath();
  ctx.fill();

  // Einzelne Salatblätter
  ctx.fillStyle = '#32CD32';
  ctx.beginPath();
  ctx.ellipse(-12, -12, 6, 3, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(8, -14, 5, 3, 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -16, 7, 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Tomaten (rot)
  ctx.fillStyle = '#DC143C';
  ctx.beginPath();
  ctx.arc(-10, -5, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(8, -3, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, -8, 3, 0, Math.PI * 2);
  ctx.fill();

  // Weiße Sauce (Knoblauch/Joghurt)
  ctx.fillStyle = '#FFFAF0';
  ctx.beginPath();
  ctx.arc(-8, 5, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(6, 8, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(0, 12, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Rote Sauce (scharf)
  ctx.fillStyle = '#FF4500';
  ctx.beginPath();
  ctx.arc(5, -2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-5, 8, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Zwiebeln (weiß)
  ctx.fillStyle = '#E6E6FA';
  ctx.beginPath();
  ctx.arc(-12, 2, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(10, 5, 2, 0, Math.PI * 2);
  ctx.fill();

  // Döner ist "offen" am unteren Ende
  ctx.fillStyle = '#D4A574';
  ctx.beginPath();
  ctx.moveTo(-15, 25);
  ctx.quadraticCurveTo(0, 35, 15, 25);
  ctx.quadraticCurveTo(0, 30, -15, 25);
  ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size * p.life), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawTimer() {
  const elapsed = Math.min(WIN_TIME, gameTime / 60);
  const remaining = WIN_TIME - elapsed;
  const pct = elapsed / WIN_TIME;

  // Progress bar
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.beginPath(); ctx.roundRect(W / 2 - 150, 12, 300, 18, 9); ctx.fill();

  const barColor = pct > 0.8 ? '#44ff44' : pct > 0.5 ? '#aaff22' : '#ffcc00';
  ctx.fillStyle = barColor;
  ctx.shadowBlur = 8;
  ctx.shadowColor = barColor;
  ctx.beginPath(); ctx.roundRect(W / 2 - 150, 12, 300 * pct, 18, 9); ctx.fill();
  ctx.shadowBlur = 0;

  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.roundRect(W / 2 - 150, 12, 300, 18, 9); ctx.stroke();

  const secs = Math.ceil(remaining);
  const mins = Math.floor(secs / 60);
  const s = secs % 60;
  const timeStr = `${mins}:${String(s).padStart(2, '0')}`;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(timeStr, W / 2, 26);

  // Score
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 18px Arial';
  ctx.textAlign = 'left';
  ctx.fillText(`${score}m`, 20, 32);

  // Highscore
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '13px Arial';
  ctx.textAlign = 'right';
  ctx.fillText(`Best: ${highScore}m`, W - 20, 32);

  // Controls
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.font = '11px Arial';
  ctx.textAlign = 'left';
  ctx.fillText('LEERTASTE / PFEIL-OBEN = Springen   PFEIL-UNTEN = Ducken', 20, H - 8);
}

function drawMenu() {
  drawSky();
  drawClouds();
  drawBgTrees();
  drawGround();
  // Horse preview
  drawHorse(W / 2 - 30, GROUND, false, Date.now() / 200, 0, 0);

  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.roundRect(W / 2 - 230, 60, 460, 230, 20); ctx.fill();
  ctx.strokeStyle = '#5a9a3a';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.roundRect(W / 2 - 230, 60, 460, 230, 20); ctx.stroke();

  ctx.fillStyle = '#5a3010';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('LEYLA SPIEL', W / 2, 130);

  ctx.fillStyle = '#666';
  ctx.font = '18px Arial';
  ctx.fillText('Pferde-Hindernisrennen', W / 2, 162);

  ctx.fillStyle = '#c0392b';
  ctx.font = 'bold 22px Arial';
  ctx.shadowBlur = 0;
  ctx.fillText('ENTER zum Starten', W / 2, 205);

  ctx.fillStyle = '#555';
  ctx.font = '14px Arial';
  ctx.fillText('LEERTASTE / PFEIL-OBEN = Springen', W / 2, 238);
  ctx.fillText('PFEIL-UNTEN = Ducken (unter Vogel)', W / 2, 260);

  if (highScore > 0) {
    ctx.fillStyle = '#8b6914';
    ctx.font = 'bold 16px Arial';
    ctx.fillText(`Highscore: ${highScore}m`, W / 2, 288);
  }
}

function drawGameOver() {
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.roundRect(W / 2 - 200, H / 2 - 110, 400, 220, 18); ctx.fill();
  ctx.strokeStyle = '#cc3333';
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.roundRect(W / 2 - 200, H / 2 - 110, 400, 220, 18); ctx.stroke();

  ctx.fillStyle = '#cc3333';
  ctx.font = 'bold 52px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('GESTUERZT!', W / 2, H / 2 - 40);

  ctx.fillStyle = '#333';
  ctx.font = 'bold 26px Arial';
  ctx.fillText(`${score} Meter geritten`, W / 2, H / 2 + 10);

  if (score >= highScore && highScore > 0) {
    ctx.fillStyle = '#8b6914';
    ctx.font = 'bold 20px Arial';
    ctx.fillText('NEUER REKORD!', W / 2, H / 2 + 45);
  }

  ctx.fillStyle = '#888';
  ctx.font = '18px Arial';
  ctx.fillText('ENTER = Nochmal', W / 2, H / 2 + 85);
}

function drawWinScreen() {
  // Play win sound once when entering win state
  if (winTimer === 1) Audio.win();

  drawSky();
  drawClouds();
  drawBgTrees();
  drawGround();
  drawParticles();

  // Döner
  drawDoner(winDonerX, winDonerY - 20, winDonerScale);

  // Horse
  drawHorse(horse.x, horse.y, false, horse.legPhase, 0, winMunchAnim);

  // Winner banner
  if (winDone || winTimer > 30) {
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.beginPath(); ctx.roundRect(W / 2 - 250, 60, 500, 160, 20); ctx.fill();
    ctx.strokeStyle = '#5a9a3a';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.roundRect(W / 2 - 250, 60, 500, 160, 20); ctx.stroke();

    ctx.fillStyle = '#2a7a1a';
    ctx.font = 'bold 54px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('GEWONNEN!', W / 2, 133);

    ctx.fillStyle = '#555';
    ctx.font = '20px Arial';
    ctx.fillText('Leyla hat alle Hindernisse gemeistert!', W / 2, 170);

    if (winDone) {
      ctx.fillStyle = '#888';
      ctx.font = '17px Arial';
      ctx.fillText('ENTER = Nochmal spielen', W / 2, 210);
    }
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Enter') {
    if (state === S.MENU || state === S.OVER) {
      Audio.start();
      reset();
      state = S.PLAY;
    }
    else if (state === S.WIN && winDone) {
      Audio.start();
      reset();
      state = S.PLAY;
    }
  }
});

function loop() {
  update();

  if (state === S.MENU) {
    drawMenu();
  } else if (state === S.PLAY) {
    drawSky();
    drawClouds();
    drawBgTrees();
    drawGround();
    drawObstacles();
    drawParticles();
    drawHorse(horse.x, horse.y, horse.ducking, horse.legPhase, horse.hitFlash, 0);
    drawTimer();
  } else if (state === S.OVER) {
    drawSky();
    drawClouds();
    drawBgTrees();
    drawGround();
    drawObstacles();
    drawParticles();
    drawHorse(horse.x, horse.y, horse.ducking, horse.legPhase, 0, 0);
    drawTimer();
    drawGameOver();
  } else if (state === S.WIN) {
    drawWinScreen();
  }

  requestAnimationFrame(loop);
}

loop();
</script>
</body>
